version: "3.1"

# ─────────────────────────────────────────────────────────────────────────────
# AgroConnect — Rasa config.yml
#
# Critical section: FallbackClassifier
# ─────────────────────────────────────────────────────────────────────────────
# The FallbackClassifier converts any NLU prediction whose confidence is
# BELOW `threshold` into the `nlu_fallback` intent.
#
# The `nlu_fallback` intent is then handled by `action_handle_fallback`
# (see rules.yml), which is context-aware:
#   • No district yet    → re-prompt Node 1
#   • District set       → re-prompt Node 2 (preserves district)
#   • Results shown      → show next-action menu
#
# This is what gives you "gibberish / emoji / out-of-domain text at any step
# re-prompts ONLY the current node" without restarting the conversation.
#
# Tune `threshold` to match your desired sensitivity:
#   0.3 → only very low-confidence predictions fall back (permissive)
#   0.7 → most off-script inputs fall back (strict, safer for agri users)
# ─────────────────────────────────────────────────────────────────────────────

recipe: default.v1

language: en

pipeline:
- name: WhitespaceTokenizer
- name: RegexFeaturizer
- name: LexicalSyntacticFeaturizer
- name: CountVectorsFeaturizer
- name: CountVectorsFeaturizer
  analyzer: char_wb
  min_ngram: 1
  max_ngram: 4
- name: DIETClassifier
  epochs: 100
  constrain_similarities: true
- name: EntitySynonymMapper
- name: ResponseSelector
  epochs: 100
  constrain_similarities: true
- name: FallbackClassifier
  threshold: 0.4            # ← adjust this to your needs
  ambiguity_threshold: 0.1

policies:
- name: MemoizationPolicy
- name: TEDPolicy
  max_history: 8             # ← increased from default 5 to track more context
  epochs: 100
- name: RulePolicy
  core_fallback_threshold: 0.4
  core_fallback_action_name: "action_handle_fallback"
  enable_fallback_prediction: true
assistant_id: 20260609-113308-compact-slope
